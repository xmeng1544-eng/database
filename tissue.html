<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tissue Atlas - 高科技学术版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 核心动画：控制器官平滑无缝放大 */
        .organ-path {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            stroke-width: 1.5;
            stroke-linejoin: round;
        }
        
        /* 鼠标悬停或激活时的超炫高科技荧光放大特效 */
        .organ-active {
            transform: scale(1.2) !important;
            fill: url(#selected-gradient) !important;
            stroke: #60a5fa !important;
            stroke-width: 2.5;
            filter: drop-shadow(0 0 25px rgba(59, 130, 246, 0.8)) drop-shadow(0 0 10px rgba(96, 165, 250, 0.5)) !important;
            z-index: 50;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 flex flex-col min-h-screen justify-between">

    <div class="bg-gradient-to-r from-slate-950 via-slate-900 to-slate-950 border-b border-slate-800 shadow-xl">

            <div class="font-medium flex items-center space-x-2 text-blue-400">
                <span class="animate-pulse">🧬</span> <span class="tracking-widest font-mono text-xs">SPATIAL TRANSCRIPTOMICS ANALYSIS PORTAL</span>
            </div>
            <a href="index.html" class="bg-slate-800/80 hover:bg-slate-700/80 text-blue-400 px-3 py-1.5 rounded-md border border-slate-700 transition font-mono text-xs">HOME</a>
        </div>
    </div>

                <div class="border-b border-slate-800 pb-3 mb-6">
                    <h3 class="text-md font-mono text-blue-400 tracking-wider">SELECT TARGET TISSUE</h3>
                    <p class="text-xs text-slate-500 mt-1">Spatial Expression & Single-Cell Annotation Maps</p>
                </div>
                
                <div data-target="brain" class="tissue-card border border-slate-800/80 bg-slate-950/60 p-4 rounded-xl shadow-md cursor-pointer hover:border-blue-500/80 hover:bg-blue-950/20 transition-all duration-300 flex items-center justify-between group">
                    <span class="font-mono text-sm text-slate-300 group-hover:text-blue-400 transition">01. Brain / Cerebrum (脑组织)</span>
                    <span class="font-mono text-xs text-slate-600 group-hover:text-blue-400 transition">&gt;&gt;</span>
                </div>

                <div data-target="lung" class="tissue-card border border-slate-800/80 bg-slate-950/60 p-4 rounded-xl shadow-md cursor-pointer hover:border-blue-500/80 hover:bg-blue-950/20 transition-all duration-300 flex items-center justify-between group">
                    <span class="font-mono text-sm text-slate-300 group-hover:text-blue-400 transition">02. Lung / Pulmonary (肺部)</span>
                    <span class="font-mono text-xs text-slate-600 group-hover:text-blue-400 transition">&gt;&gt;</span>
                </div>

                <div data-target="heart" class="tissue-card border border-slate-800/80 bg-slate-950/60 p-4 rounded-xl shadow-md cursor-pointer hover:border-blue-500/80 hover:bg-blue-950/20 transition-all duration-300 flex items-center justify-between group">
                    <span class="font-semibold font-mono text-sm text-slate-300 group-hover:text-blue-400 transition">03. Heart / Myocardium (心脏)</span>
                    <span class="font-mono text-xs text-slate-600 group-hover:text-blue-400 transition">&gt;&gt;</span>
                </div>

                <div data-target="liver" class="tissue-card border border-slate-800/80 bg-slate-950/60 p-4 rounded-xl shadow-md cursor-pointer hover:border-blue-500/80 hover:bg-blue-950/20 transition-all duration-300 flex items-center justify-between group">
                    <span class="font-mono text-sm text-slate-300 group-hover:text-blue-400 transition">04. Liver / Hepatic (肝脏)</span>
                    <span class="font-mono text-xs text-slate-600 group-hover:text-blue-400 transition">&gt;&gt;</span>
                </div>

                <div data-target="kidney" class="tissue-card border border-slate-800/80 bg-slate-950/60 p-4 rounded-xl shadow-md cursor-pointer hover:border-blue-500/80 hover:bg-blue-950/20 transition-all duration-300 flex items-center justify-between group">
                    <span class="font-mono text-sm text-slate-300 group-hover:text-blue-400 transition">05. Kidney / Renal Cortex (肾脏)</span>
                    <span class="font-mono text-xs text-slate-600 group-hover:text-blue-400 transition">&gt;&gt;</span>
                </div>
            </div>
