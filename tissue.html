<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tissue Atlas - 纯代码版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 核心动画：控制代码画的器官平滑放大 */
        .organ-path {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center;
            cursor: pointer;
        }
        /* 鼠标划过对应组织名或图形时的放大高亮样式 */
        .organ-active {
            transform: scale(1.25) !important;
            fill: #3b82f6 !important; /* 科技蓝 */
            filter: drop-shadow(0 10px 15px rgb(59 130 246 / 0.5));
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen justify-between">

    <!-- 顶部深蓝色功能条 -->
    <div class="bg-gradient-to-r from-slate-900 via-blue-900 to-indigo-950 border-b border-blue-800 shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center text-sm text-white">
            <div class="font-medium flex items-center space-x-2 text-blue-200">
                <span>🌐</span> <span>Multi-Species Computational Genomics Platform</span>
            </div>
            <a href="index.html" class="bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-md border border-white/10 transition font-medium">HOME</a>
        </div>
    </div>

    <!-- 主体：左边文字框，右边纯代码 SVG -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-4 py-12">
        <div class="flex flex-col lg:flex-row items-center justify-center gap-12 bg-white p-8 rounded-3xl border border-gray-100 shadow-sm">
            
            <!-- 左侧：组织卡片 -->
            <div class="w-full lg:w-2/5 space-y-3">
                <h3 class="text-lg font-bold text-gray-700 border-b pb-2 mb-4">📌 Human Organs List</h3>
                
                <div data-target="brain" class="tissue-card border border-gray-200 bg-white p-4 rounded-xl shadow-sm cursor-pointer hover:border-blue-500 hover:bg-blue-50/50 transition-all flex items-center justify-between group">
                    <span class="font-semibold text-gray-700 group-hover:text-blue-600">🧠 Brain (大脑)</span>
                    <span class="text-xs text-gray-400">&rarr;</span>
                </div>

                <div data-target="lung" class="tissue-card border border-gray-200 bg-white p-4 rounded-xl shadow-sm cursor-pointer hover:border-blue-500 hover:bg-blue-50/50 transition-all flex items-center justify-between group">
                    <span class="font-semibold text-gray-700 group-hover:text-blue-600">🫁 Lung (肺部)</span>
                    <span class="text-xs text-gray-400">&rarr;</span>
                </div>

                <div data-target="heart" class="tissue-card border border-gray-200 bg-white p-4 rounded-xl shadow-sm cursor-pointer hover:border-blue-500 hover:bg-blue-50/50 transition-all flex items-center justify-between group">
                    <span class="font-semibold text-gray-700 group-hover:text-blue-600">❤️ Heart (心脏)</span>
                    <span class="text-xs text-gray-400">&rarr;</span>
                </div>

                <div data-target="liver" class="tissue-card border border-gray-200 bg-white p-4 rounded-xl shadow-sm cursor-pointer hover:border-blue-500 hover:bg-blue-50/50 transition-all flex items-center justify-between group">
                    <span class="font-semibold text-gray-700 group-hover:text-blue-600">🪵 Liver (肝脏)</span>
                    <span class="text-xs text-gray-400">&rarr;</span>
                </div>

                <div data-target="kidney" class="tissue-card border border-gray-200 bg-white p-4 rounded-xl shadow-sm cursor-pointer hover:border-blue-500 hover:bg-blue-50/50 transition-all flex items-center justify-between group">
                    <span class="font-semibold text-gray-700 group-hover:text-blue-600">🧼 Kidney (肾脏)</span>
                    <span class="text-xs text-gray-400">&rarr;</span>
                </div>
            </div>

            <!-- 右侧：全代码手绘的精细 SVG 人体和器官 -->
            <div class="w-full lg:w-3/5 flex justify-center bg-slate-950 p-8 rounded-2xl relative shadow-inner">
                <svg width="360" height="520" viewBox="0 0 360 520" class="overflow-visible">
                    
                    <!-- 1. 纯代码画：人体中枢骨架剪影 (中性灰色背景) -->
                    <path d="M180,20 C145,20 135,45 135,65 C135,90 155,95 160,110 C140,120 110,135 90,160 C70,185 75,230 75,260 C75,270 85,270 85,260 C85,230 80,195 100,175 C115,160 135,150 155,145 L155,320 C140,340 120,370 100,430 C80,490 85,500 95,500 C105,500 115,480 130,440 C145,400 165,370 180,360 C195,370 215,400 230,440 C245,480 255,500 265,500 C275,500 280,490 260,430 C240,370 220,340 205,320 L205,145 C225,150 245,160 260,175 C280,195 275,230 275,260 C275,270 285,270 285,260 C285,230 290,185 270,160 C250,135 220,120 200,110 C205,95 225,90 225,65 C225,45 215,20 180,20 Z" fill="#1e293b" />
                    
                    <!-- 2. 纯代码器官：Brain (大脑) -->
                    <path id="organ-brain" class="organ-path" d="M180,25 C155,25 142,40 142,58 C142,72 152,82 165,82 C170,82 175,78 180,82 C185,78 190,82 195,82 C208,82 218,72 218,58 C218,40 205,25 180,25 Z" fill="#fca5a5" transform-origin="180 55" />
                    
                    <!-- 3. 纯代码器官：Lung (肺部 - 左右双叶成组) -->
                    <g id="organ-lung" class="organ-path" fill="#fbcfe8" transform-origin="180 165">
                        <!-- 左肺 -->
                        <path d="M172,130 C155,125 125,135 125,170 C125,205 150,215 170,200 C175,195 175,145 172,130 Z" />
                        <!-- 右肺 -->
                        <path d="M188,130 C205,125 235,135 235,170 C235,205 210,215 190,200 C185,195 185,145 188,130 Z" />
                    </g>

                    <!-- 4. 纯代码器官：Heart (心脏) -->
                    <path id="organ-heart" class="organ-path" d="M180,150 C180,150 160,135 160,155 C160,175 180,195 180,195 C180,195 200,175 200,155 C200,135 180,150 180,150 Z" fill="#fda4af" transform-origin="180 165" />
                    
                    <!-- 5. 纯代码器官：Liver (肝脏) -->
                    <path id="organ-liver" class="organ-path" d="M135,215 C135,215 175,210 195,220 C205,225 190,245 170,245 C150,245 130,230 135,215 Z" fill="#fdba74" transform-origin="165 230" />
                    
                    <!-- 6. 纯代码器官：Kidney (肾脏 - 左右成组) -->
                    <g id="organ-kidney" class="organ-path" fill="#fed7aa" transform-origin="180 270">
                        <!-- 左肾 -->
                        <path d="M145,255 C135,255 135,285 145,285 C152,285 152,255 145,255 Z" />
                        <!-- 右肾 -->
                        <path d="M215,255 C225,255 225,285 215,285 C208,285 208,255 215,255 Z" />
                    </g>
                </svg>
            </div>

        </div>
    </main>

    <!-- 页脚 -->
    <footer class="bg-gray-900 text-gray-400 py-6 text-center text-sm border-t border-gray-800">
        &copy; 2026 基因组学数据共享共享平台. 保留所有权利.
    </footer>

    <!-- JavaScript 联动逻辑 -->
    <script>
        const tissueCards = document.querySelectorAll('.tissue-card');
        tissueCards.forEach(card => {
            const targetName = card.getAttribute('data-target');
            const targetSvgOrgan = document.getElementById(`organ-${targetName}`);

            // 划过文字卡片 -> 对应的代码图形放大
            card.addEventListener('mouseenter', () => {
                if (targetSvgOrgan) targetSvgOrgan.classList.add('organ-active');
            });
            card.addEventListener('mouseleave', () => {
                if (targetSvgOrgan) targetSvgOrgan.classList.remove('organ-active');
            });

            // 反向联动：划过代码图形 -> 文字卡片亮起
            if (targetSvgOrgan) {
                targetSvgOrgan.addEventListener('mouseenter', () => {
                    card.classList.add('border-blue-500', 'bg-blue-50/50');
                });
                targetSvgOrgan.addEventListener('mouseleave', () => {
                    card.classList.remove('border-blue-500', 'bg-blue-50/50');
                });
            }
        });
    </script>

</body>
</html>
